name: Publish WASM Site (rs)

on:
  schedule:
    - cron: "47 3 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write
  packages: read

concurrency:
  group: pages-wasm-site-rs
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    container: ghcr.io/tonky/nix-search-ci:1924186116c8e55e673d12f6fd48772ed75b9d2c
    outputs:
      version: ${{ steps.run.outputs.version }}
      package_count: ${{ steps.run.outputs.package_count }}
      checksum: ${{ steps.run.outputs.checksum }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify baked image matches source
        run: scripts/ci/verify-image.sh

      - name: Run publish pipeline
        id: run
        env:
          PAGE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: ci publish --out tmp/pages-data

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: crates/nix-search-web/dist

  deploy:
    needs: prepare
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Run summary
        run: |
          {
            echo "## WASM Site Publish"
            echo
            echo "- Version: ${{ needs.prepare.outputs.version }}"
            echo "- Package count: ${{ needs.prepare.outputs.package_count }}"
            echo "- Checksum: ${{ needs.prepare.outputs.checksum }}"
            echo "- Page URL: ${{ steps.deployment.outputs.page_url }}"
            echo "- Manifest URL: ${{ steps.deployment.outputs.page_url }}data/manifest.json"
          } >> "$GITHUB_STEP_SUMMARY"
