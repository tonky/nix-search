name: Publish WASM Site

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-wasm-site
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.manifest.outputs.version }}
      package_count: ${{ steps.manifest.outputs.package_count }}
      checksum: ${{ steps.manifest.outputs.checksum }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Build prep command
        run: cargo build --bin nix-search

      - name: Install Trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk@0.21.14

      - name: Ensure wasm target is available
        run: rustup target add wasm32-unknown-unknown

      - name: Ensure jq is available
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi

      - name: Run local prep command
        run: cargo run -- prep-web --output tmp/pages-data

      - name: Sync prepared data into web static assets
        run: |
          mkdir -p crates/nix-search-web/static/data
          rm -f crates/nix-search-web/static/data/packages-*.json
          cp tmp/pages-data/manifest.json crates/nix-search-web/static/data/manifest.json
          cp tmp/pages-data/$(jq -r '.artifact' tmp/pages-data/manifest.json) crates/nix-search-web/static/data/

      - name: Build web bundle
        run: cd crates/nix-search-web && trunk build --release --public-url /nix-search/

      - name: Read manifest values
        id: manifest
        run: |
          MANIFEST="tmp/pages-data/manifest.json"
          echo "version=$(jq -r '.version' "$MANIFEST")" >> "$GITHUB_OUTPUT"
          echo "package_count=$(jq -r '.package_count' "$MANIFEST")" >> "$GITHUB_OUTPUT"
          echo "checksum=$(jq -r '.checksum' "$MANIFEST")" >> "$GITHUB_OUTPUT"

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: crates/nix-search-web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Run summary
        run: |
          {
            echo "## WASM Site Publish"
            echo
            echo "- Version: ${{ needs.prepare.outputs.version }}"
            echo "- Package count: ${{ needs.prepare.outputs.package_count }}"
            echo "- Checksum: ${{ needs.prepare.outputs.checksum }}"
            echo "- Page URL: ${{ steps.deployment.outputs.page_url }}"
            echo "- Manifest URL: ${{ steps.deployment.outputs.page_url }}data/manifest.json"
          } >> "$GITHUB_STEP_SUMMARY"
