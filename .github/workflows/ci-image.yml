name: CI image

on:
  push:
    branches:
      - main
    paths:
      - Cargo.lock
      - ci/Dockerfile
      - crates/ci/**
      - .github/workflows/ci-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/tonky/nix-search-ci:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test baked binary
        run: |
          docker pull ghcr.io/tonky/nix-search-ci:${{ github.sha }}
          docker run --rm ghcr.io/tonky/nix-search-ci:${{ github.sha }} doctor

  smoke:
    needs: build
    runs-on: ubuntu-latest
    container: ghcr.io/tonky/nix-search-ci:${{ github.sha }}
    env:
      RUN_TRUNK_BUILD: "1"
      PERF_MODE: quick

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run doctor inside container job
        run: ci doctor

      - name: Run quick budget inside container job
        run: ci budget --perf-mode quick --out tmp/bench/perf-size-ci
