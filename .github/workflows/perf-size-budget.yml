name: Perf and Size Budget

on:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  budget:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq brotli

      - name: Install Trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk@0.21.14

      - name: Ensure wasm target is available
        run: rustup target add wasm32-unknown-unknown

      - name: Prepare web data for budget checks
        run: |
          cargo run --release -- prep-web --output tmp/pages-data
          mkdir -p crates/nix-search-web/static/data
          rm -f crates/nix-search-web/static/data/packages-*.json
          rm -f crates/nix-search-web/static/data/packages-*.json.br
          cp tmp/pages-data/manifest.json crates/nix-search-web/static/data/manifest.json
          cp tmp/pages-data/$(jq -r '.artifact' tmp/pages-data/manifest.json) crates/nix-search-web/static/data/
          compressed=$(jq -r '.compressed_artifact // empty' tmp/pages-data/manifest.json)
          if [[ -n "$compressed" ]] && [[ -f "tmp/pages-data/$compressed" ]]; then
            cp "tmp/pages-data/$compressed" crates/nix-search-web/static/data/
          fi

      - name: Run perf/size budget checks
        run: |
          PERF_MODE=full \
          SEARCH_P95_WARN_MS=45 \
          SEARCH_P95_FAIL_MS=120 \
          scripts/perf/check_budgets.sh tmp/bench/perf-size-ci

      - name: Upload perf/size artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-size-ci
          path: tmp/bench/perf-size-ci
